name: 🚀 Build & Release

# 触发器：推送标签时触发（例如 git tag v1.0.0 && git push --tags）
on:
  push:
    tags:
      - 'v*' # 匹配 v1.0, v1.0.1 等

jobs:
  # 1. 构建任务 (跨平台矩阵)
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 定义构建矩阵：Windows 和 Mac
        include:
          - os: windows-latest
            platform: windows
            binary: lanfiletransfertool.exe
            # Wails 构建参数：windows/amd64
            arch: windows/amd64
          - os: macos-latest
            platform: darwin
            binary: lanfiletransfertool
            # Wails 构建参数：darwin/amd64 (如果是 Apple Silicon 可能需要 darwin/arm64)
            arch: darwin/amd64

    steps:
      - name: 🔑 Checkout Code
        uses: actions/checkout@v4

      # --- Go 环境配置 ---
      - name: ⚙️ Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.3' # 请确保版本与你本地一致

      # --- Node.js 环境配置 (前端依赖) ---
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.7' # 请确保版本与你本地一致
          cache: 'npm' # 自动缓存 node_modules，加速构建

      # --- 安装依赖 ---
      - name: 📦 Install Go Dependencies
        run: go mod download

      - name: 📦 Install Frontend Dependencies
        # 注意：这一步会根据你前端的 package.json 自动安装依赖
        working-directory: ./frontend
        run: npm ci
        # 如果你用的是 pnpm，请改为: pnpm install --frozen-lockfile
        # 如果你用的是 yarn，请改为: yarn install --frozen-lockfile

      # --- 安装 Wails CLI ---
      - name: 🛠️ Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # --- 构建应用 ---
      - name: 🏗️ Build Application
        # 关键点：使用 -platform 参数指定目标平台，Wails 会自动处理 CGO 和前端构建
        run: wails build -platform ${{ matrix.arch }} -clean

      # --- 上传构建产物 (暂存) ---
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-bin
          path: ./build/bin/${{ matrix.binary }}

  # 2. 发布任务 (依赖构建任务，将所有文件合并发布)
  release:
    needs: build # 等待 build 任务完成
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4

      # 使用 7-Zip 压缩文件，让 Release 页面更整洁
      # - name: 📦 Compress Binaries
      #   run: |
      #     # Windows 压缩 exe
      #     zip windows-build.zip windows-bin/lanfiletransfertool.exe
      #     # Mac 压缩 app (Wails 默认生成的是 .app 包)
      #     # 注意：Wails 生成的 Mac 应用通常是 "AppName.app"，请根据实际文件名调整
      #     # 如果是直接生成的二进制文件，可以改为压缩二进制
      #     zip macos-build.zip macos-bin/lanfiletransfertool.app/*

      # - name: 🚀 Create Release
      #   uses: ncipollo/release-action@v1
      #   with:
      #     # 自动将所有压缩包作为 Release Assets 上传
      #     artifacts: "windows-build.zip, macos-build.zip"
      #     # 自动生成 Release 说明
      #     generateReleaseNotes: true
      #     # 只有打 tag 才会创建 Release
      #     tag: ${{ github.ref }}
            # --- 压缩产物 (Cross-platform packaging) ---
      - name: 📦 Zip Artifacts
        run: |
          # 1. Windows 打包
          # 确保进入 bin 目录或者使用正确的相对路径
          if [ -f "build/bin/lanfiletransfertool.exe" ]; then
            echo "Zipping Windows binary..."
            # -j 参数表示只存文件不存目录结构，这样解压出来直接是exe
            zip windows-build.zip build/bin/lanfiletransfertool.exe
          fi

          # 2. macOS 打包
          # Wails 在 macOS 上生成的是 .app 包（实际上是一个文件夹）
          if [ -d "build/bin/lanfiletransfertool.app" ]; then
            echo "Zipping macOS app..."
            # 直接压缩 .app 文件夹，不要用 *
            # -r 表示递归压缩文件夹
            zip -r macos-build.zip build/bin/lanfiletransfertool.app
          else
            echo "Warning: macOS .app not found! Listing build/bin content for debug:"
            ls -R build/bin
          fi

      # --- 上传产物 ---
      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: builds-${{ matrix.platform }}
          # 上传生成的 zip 包
          path: |
            windows-build.zip
            macos-build.zip