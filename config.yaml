app:
  name: "LAN-File-Transfer-Tool"
  short_name: "LANftt"
  version: "0.2.0"

server:
  port: 8080
  host: "0.0.0.0"

discovery:
  enabled: true
  port: 37021
  broadcast_interval: 5
  peer_timeout: 30

websocket:
  enabled: true
  port_offset: 0
  chunk_size: 65536

udp:
  enabled: true
  port: 37022
  chunk_size: 32768

p2p:
  enabled: true
  port: 37023
  chunk_size: 65536

transfer:
  max_connections: 10
  chunk_size: 1048576
  enable_resume: true

security:
  token_expiry: 86400
  secret_key: "lanftt-default-secret-key-change-in-production"
  whitelist: []
  blacklist: []

history:
  max_records: 100

performance:
  pool_size: 10
  monitor_interval: 2
